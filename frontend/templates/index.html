<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iBrood Detector - Choose Mode</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: linear-gradient(to bottom, #fffbee, #fdf5cc);
      font-family: 'Segoe UI', sans-serif;
    }

    .center-wrapper {
      min-height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .card {
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      background: #fffdf4;
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      color: #d1950c;
      font-weight: 700;
      margin-bottom: 2rem;
    }

    .btn-choose {
      width: 100%;
      padding: 1rem;
      font-size: 1.2rem;
      margin-bottom: 1rem;
      background-color: #f0c03d;
      color: #3f3200;
      border: none;
      font-weight: 600;
      border-radius: 12px;
    }

    .btn-choose:hover {
      background-color: #dab029;
    }
  </style>
</head>
<body>
  <div class="center-wrapper">
    <div class="card">
      <h1>🐝 iBrood Detector</h1>
      <p>Select feature</p>
      <button class="btn-choose" onclick="location.href='queen.html'">Queen Cell Maturity</button>
      <button class="btn-choose" onclick="location.href='brood.html'">Brood Health</button>
    </div>
  </div>
</body>
</html>
