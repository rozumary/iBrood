<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Queen Cell Maturity Detector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #fff8e1;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card-custom {
      width: 100%;
      max-width: 1100px;
      padding: 2rem;
      background-color: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }

    h1 {
      color: #d1950c;
      font-weight: bold;
    }

    .btn-upload {
      background-color: #f0c03d;
      color: #3f3200;
      font-weight: bold;
      border: none;
    }

    .btn-upload:hover {
      background-color: #dab029;
    }

    #output-img {
      max-width: 100%;
      border-radius: 12px;
      border: 2px solid #f0c03d;
    }

    .preview-box {
      width: 100%;
      max-width: 400px;
    }

    .results-box {
      flex-grow: 1;
    }

    @media (max-width: 768px) {
      .horizontal-layout {
        flex-direction: column !important;
      }
    }
  </style>
</head>
<body>
  <div class="card card-custom">
    <h1 class="text-center mb-4">
      <i class="bi bi-bezier2"></i> Queen Cell Maturity Detector
    </h1>

    <div class="d-flex horizontal-layout flex-md-row flex-column justify-content-center align-items-start gap-4">
      <!-- Left: Upload + Preview -->
      <div class="preview-box">
        <input type="file" accept="image/*" class="form-control mb-2" id="image-input" />
        <div class="form-check mb-2">
          <input class="form-check-input" type="checkbox" id="toggle-masks" checked>
          <label class="form-check-label" for="toggle-masks">
            Show Masks
          </label>
        </div>
        <button class="btn btn-upload w-100" onclick="detectQueenCell()">
          <i class="bi bi-search"></i> Detect
        </button>

        <img id="output-img" class="mt-3" style="display:none;" />

        <!-- Buttons -->
        <div class="d-flex gap-2 justify-content-between mt-3">
          <button class="btn btn-secondary w-50" onclick="resetForm()">
            <i class="bi bi-arrow-counterclockwise"></i> Reset
          </button>
          <button class="btn btn-success w-50" id="download-btn" style="display:none;" onclick="downloadImage()">
            <i class="bi bi-download"></i> Download
          </button>
        </div>
      </div>

      <!-- Right: Result -->
      <div class="results-box" id="result"></div>
    </div>
  </div>

<script>
  const shortLabelMap = {
    "Queen Cup (Initiation)": "Cup",
    "Open Queen Cell (3–5 days, larva visible)": "Open Cell",
    "Closed Queen Cell (5–8 days, uniform cap)": "Closed Cell",
    "Matured Queen Cell (dark conical tip)": "Matured",
    "Post Hatch Cell (jagged/open tip, emerged)": "Hatched",
    "Failed Cell (dead/abnormal)": "Failed"
  };

  async function detectQueenCell() {
    const input = document.getElementById('image-input');
    const output = document.getElementById('output-img');
    const result = document.getElementById('result');
    const downloadBtn = document.getElementById('download-btn');

    if (!input.files || !input.files[0]) {
      alert("Please select an image.");
      return;
    }

    const formData = new FormData();
    formData.append("file", input.files[0]);

    result.innerHTML = `<p class='text-muted'><i class="bi bi-hourglass-split"></i> Analyzing queen cells...</p>`;
    output.style.display = 'none';
    downloadBtn.style.display = 'none';

    try {
      const response = await fetch("/queen_detect", {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(errText);
      }

      const data = await response.json();

      if (data.image_base64) {
        output.src = `data:image/jpeg;base64,${data.image_base64}`;
        output.style.display = 'block';
        downloadBtn.style.display = 'inline-block';
      }

      // === Table 1: Summary ===
      let summaryHTML = `
        <div class="alert alert-warning">
          <h5><i class="bi bi-collection"></i> Detected Queen Cell Types:</h5>
          ${Object.entries(data.summary || {}).map(([type, count]) => `
            <div class="d-flex justify-content-between">
              <span>${shortLabelMap[type] || type}</span>
              <span class="badge bg-dark">${count}</span>
            </div>`).join('')}
        </div>
      `;

      // === Table 2: Estimated Hatching ===
      if (data.cells && data.cells.length > 0) {
        const grouped = {};

        data.cells.forEach(cell => {
          const label = shortLabelMap[cell.type] || cell.type;
          if (!grouped[label]) {
            grouped[label] = {
              count: 0,
              estimated_hatching: cell.estimated_hatching || '–'
            };
          }
          grouped[label].count++;
        });

        summaryHTML += `
          <h5 class="mt-4"><i class="bi bi-calendar-event"></i> Estimated Hatching Time</h5>
          <table class="table table-bordered table-sm">
            <thead class="table-light">
              <tr>
                <th>Queen Cell Type</th>
                <th>Count</th>
                <th>Estimated Hatching</th>
              </tr>
            </thead>
            <tbody>
              ${Object.entries(grouped).map(([label, info]) => `
                <tr>
                  <td>${label}</td>
                  <td>${info.count}</td>
                  <td>${info.estimated_hatching}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      result.innerHTML = summaryHTML;

    } catch (error) {
      console.error("Detection failed:", error);
      console.error("Error details:", error.message);
      result.innerHTML = `<div class='text-danger'><i class="bi bi-x-circle"></i> Error occurred during detection. Please try again.<br><small>${error.message}</small></div>`;
    }
  }

  function resetForm() {
    document.getElementById('image-input').value = '';
    document.getElementById('output-img').src = '';
    document.getElementById('output-img').style.display = 'none';
    document.getElementById('result').innerHTML = '';
    document.getElementById('download-btn').style.display = 'none';
  }

  function downloadImage() {
    const img = document.getElementById('output-img');
    const link = document.createElement('a');
    link.href = img.src;
    link.download = 'annotated_queen_cell.jpg';
    link.click();
  }
</script>

</body>
</html>
